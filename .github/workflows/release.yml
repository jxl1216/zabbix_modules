name: Release Zabbix Clonehosts Module

# 当 manifest.json 中的 version 字段升级并推送到主分支时，自动打包 tar.gz 并发布 Release。
# 也支持手动触发（workflow_dispatch）。

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'zabbix_clonehosts/manifest.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('zabbix_clonehosts/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected module version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} does not exist, will create release."
          fi

      - name: Package tar.gz
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # 将 zabbix_clonehosts 目录打包，解压后即为 zabbix_clonehosts/ 目录
          tar -czf "zabbix_clonehosts-${VERSION}.tar.gz" zabbix_clonehosts
          echo "Packaged zabbix_clonehosts-${VERSION}.tar.gz:"
          ls -lh "zabbix_clonehosts-${VERSION}.tar.gz"
          echo "--- Archive contents ---"
          tar -tzf "zabbix_clonehosts-${VERSION}.tar.gz" | head -n 20

      - name: Create tag and publish Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Zabbix Clonehosts v${{ steps.version.outputs.version }}
          files: zabbix_clonehosts-${{ steps.version.outputs.version }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Zabbix Clonehosts 模块 v${{ steps.version.outputs.version }}

            ### 部署方式

            1. 下载下方 `zabbix_clonehosts-${{ steps.version.outputs.version }}.tar.gz`
            2. 上传到 Zabbix 服务器并解压到模块目录：

            ```bash
            # Zabbix 6.0 / 7.0
            tar -xzf zabbix_clonehosts-${{ steps.version.outputs.version }}.tar.gz -C /usr/share/zabbix/modules/

            # Zabbix 7.2 / 7.4 / 8.0
            tar -xzf zabbix_clonehosts-${{ steps.version.outputs.version }}.tar.gz -C /usr/share/zabbix/ui/modules/
            ```

            3. Zabbix 6.0 需修改 manifest_version：
            ```bash
            sed -i 's/"manifest_version": 2.0/"manifest_version": 1.0/' /usr/share/zabbix/modules/zabbix_clonehosts/manifest.json
            ```

            4. 在 Administration → General → Modules 中扫描并启用模块。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
