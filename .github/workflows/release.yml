name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Extract version
      id: version
      run: |
        VERSION=$(jq -r '.version' HostBatchClone/manifest.json)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
    - name: Zip
      run: zip -r HostBatchClone_v${{ steps.version.outputs.VERSION }}.zip HostBatchClone/
    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v${{ steps.version.outputs.VERSION }} \
          --title "HostBatchClone v${{ steps.version.outputs.VERSION }}" \
          --body "## Installation\n\nExtract HostBatchClone directory to your Zabbix modules directory." \
          HostBatchClone_v${{ steps.version.outputs.VERSION }}.zip