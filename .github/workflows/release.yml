name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from manifest.json
      id: extract_version
      run: |
        VERSION=$(jq -r '.version' HostBatchClone/manifest.json)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_TAG=v$VERSION" >> $GITHUB_OUTPUT
        echo "DEBUG: VERSION=$VERSION, RELEASE_TAG=v$VERSION"

    - name: Debug info
      run: |
        echo "Current directory: $(pwd)"
        ls -la
        echo "Git tags:"
        git tag -l

    - name: Validate PHP syntax
      run: |
        find HostBatchClone -name "*.php" -type f | while read -r phpfile; do
          php -l "$phpfile" || exit 1
        done

    - name: Archive files
      run: |
        zip -r HostBatchClone_v${{ steps.extract_version.outputs.VERSION }}.zip HostBatchClone/
        ls -la HostBatchClone_v${{ steps.extract_version.outputs.VERSION }}.zip

    - name: Get commit messages
      id: commit_messages
      run: |
        COMMITS=$(git log --oneline -10)
        echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "DEBUG: Commits to include:"
        echo "$COMMITS"

    - name: Create Release with GitHub CLI
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ steps.extract_version.outputs.VERSION }}"
        NAME="HostBatchClone v${{ steps.extract_version.outputs.VERSION }}"
        BODY=$(cat <<EOF
## Changes

${{ steps.commit_messages.outputs.COMMITS }}

## Installation

Download the zip file below and extract the \`HostBatchClone\` directory to your Zabbix modules directory.

- Zabbix 6.0 / 7.0: \`/usr/share/zabbix/modules/\`
- Zabbix 7.4 / 8.0: \`/usr/share/zabbix/ui/modules/\`
EOF
        )
        echo "DEBUG: Creating release with tag=$TAG, name=$NAME"
        gh release create "$TAG" \
          --title "$NAME" \
          --body "$BODY" \
          --draft=false \
          --prerelease=false \
          HostBatchClone_v${{ steps.extract_version.outputs.VERSION }}.zip